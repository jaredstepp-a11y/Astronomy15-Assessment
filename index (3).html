const STARS = Array.from({ length: 140 }, (_, i) => {
  const phi = 0.618033988749895;
  return {
    id: i,
    x: ((i * phi * 97.3) % 100),
    y: ((i * phi * 61.8) % 100),
    r: i % 9 === 0 ? 2 : i % 4 === 0 ? 1.5 : 1,
    o: 0.25 + (i % 8) * 0.08,
    d: 2.5 + (i % 5) * 0.7,
    delay: (i % 10) * 0.35,
  };
});

// ─── Colour helpers ───────────────────────────────────────────────────────────
const grade = (pct) => {
  if (pct >= 90) return { g: "A+", label: "Outstanding", col: "#34D399" };
  if (pct >= 80) return { g: "A", label: "Excellent", col: "#6EE7B7" };
  if (pct >= 70) return { g: "B", label: "Proficient", col: "#FBBF24" };
  if (pct >= 60) return { g: "C", label: "Developing", col: "#F97316" };
  return { g: "D", label: "Needs Review", col: "#F87171" };
};

            padding: "5px 14px", borderRadius: 20, fontSize: 12, cursor: "pointer",
            fontWeight: step === i ? 700 : 400, transition: "all 0.2s",
          }}>
            {s}
          </button>
        ))}
      </div>

      {/* Step 0: Overview */}
      {step === 0 && (
        <Card>
          <h3 style={{ margin: "0 0 12px", color: mod.color, fontFamily: "'Orbitron', sans-serif", fontSize: 14 }}>Module Overview</h3>
          <p style={{ margin: "0 0 16px", color: "#CBD5E1", lineHeight: 1.8, fontSize: 14 }}>{mod.overview}</p>
          <div style={{ background: `${mod.color}15`, border: `1px solid ${mod.color}30`, borderRadius: 10, padding: "12px 16px" }}>
            <div style={{ fontSize: 11, color: mod.color, fontWeight: 700, marginBottom: 4, letterSpacing: 1 }}>📋 ALBERTA CURRICULUM ALIGNMENT</div>
            <div style={{ fontSize: 12, color: "#94A3B8", lineHeight: 1.6 }}>
              This module aligns with the Alberta Astronomy 15 Science curriculum — covering key outcomes related to {mod.title.toLowerCase()} and cosmological concepts for Grade 10–12 students.
            </div>
          </div>
        </Card>
      )}

      {/* Step 1: Key facts */}
      {step === 1 && (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {mod.facts.map((f, i) => (
            <Card key={i} style={{ display: "flex", gap: 14, alignItems: "flex-start", padding: "14px 18px", animation: `fadeIn 0.3s ease ${i * 0.07}s both` }}>
              <span style={{ fontSize: 22, flexShrink: 0, marginTop: 2 }}>{f.icon}</span>
              <div>
                <div style={{ fontWeight: 700, color: mod.color, fontSize: 13, marginBottom: 3 }}>{f.h}</div>
                <div style={{ color: "#94A3B8", fontSize: 13, lineHeight: 1.65 }}>{f.b}</div>
              </div>
            </Card>
          ))}
        </div>
      )}

      {/* Step 2: Extra reference */}
      {step === 2 && <ExtraContent mod={mod} />}

      {/* Navigation */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 20 }}>
        {step > 0
          ? <Btn onClick={() => setStep(s => s - 1)} color="#334155" style={{ boxShadow: "none" }}>← Back</Btn>
          : <div />
        }
        {isLast
          ? <Btn onClick={onQuiz} color={mod.glow || mod.color}>Start Quiz →</Btn>
          : <Btn onClick={() => setStep(s => s + 1)} color={mod.glow || mod.color}>Next →</Btn>
        }
      </div>
    </div>
  );
}

function ExtraContent({ mod }) {
  if (mod.extraType === "timeline") {
    return (
      <Card>
        <h3 style={{ margin: "0 0 16px", color: mod.color, fontFamily: "'Orbitron', sans-serif", fontSize: 13 }}>{mod.extraTitle}</h3>
        <div style={{ position: "relative" }}>
          <div style={{ position: "absolute", left: 68, top: 0, bottom: 0, width: 2, background: `linear-gradient(to bottom, ${mod.color}, ${mod.color}22)` }} />
          {mod.extraItems.map((item, i) => (
            <div key={i} style={{ display: "flex", gap: 16, marginBottom: 18, alignItems: "flex-start" }}>
              <div style={{ width: 68, flexShrink: 0, textAlign: "right", fontSize: 10, color: mod.color, fontFamily: "'Orbitron', sans-serif", fontWeight: 700, paddingTop: 4 }}>{item.t}</div>
              <div style={{ width: 12, height: 12, borderRadius: "50%", background: mod.color, flexShrink: 0, marginTop: 3, boxShadow: `0 0 8px ${mod.color}` }} />
              <div style={{ fontSize: 13, color: "#CBD5E1", lineHeight: 1.5 }}>{item.e}</div>
            </div>
          ))}
        </div>
      </Card>
    );
  }

  if (mod.extraType === "table") {
    return (
      <Card>
        <h3 style={{ margin: "0 0 14px", color: mod.color, fontFamily: "'Orbitron', sans-serif", fontSize: 13 }}>{mod.extraTitle}</h3>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
            <thead>
              <tr>{mod.extraCols.map(c => (
                <th key={c} style={{ background: `${mod.color}33`, color: mod.color, padding: "8px 10px", textAlign: "left", borderBottom: `2px solid ${mod.color}44`, fontFamily: "'Orbitron', sans-serif", fontSize: 10, letterSpacing: 0.5 }}>{c}</th>
              ))}</tr>
            </thead>
            <tbody>
              {mod.extraRows.map((row, i) => (
                <tr key={i} style={{ background: row[2]?.includes("5,200") ? `${mod.color}15` : "transparent" }}>
                  {row.map((cell, j) => (
                    <td key={j} style={{ padding: "8px 10px", borderBottom: "1px solid rgba(255,255,255,0.07)", color: j === 0 ? mod.color : "#94A3B8", fontWeight: j === 0 ? 700 : 400 }}>{cell}</td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{ marginTop: 12, fontSize: 11, color: "#475569", textAlign: "center" }}>
          Mnemonic: <span style={{ color: mod.color, fontStyle: "italic" }}>"Oh Be A Fine Guy, Kiss Me"</span>
        </div>
      </Card>
    );
  }

  if (mod.extraType === "scale") {
    return (
      <Card>
        <h3 style={{ margin: "0 0 14px", color: mod.color, fontFamily: "'Orbitron', sans-serif", fontSize: 13 }}>{mod.extraTitle}</h3>
        {mod.extraItems.map((item, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10, animation: `fadeIn 0.3s ease ${i * 0.06}s both` }}>
            <div style={{ flex: 1, height: 6, background: `linear-gradient(90deg, ${mod.color}, ${mod.color}33)`, borderRadius: 3, minWidth: (i + 1) * 10 + "%", maxWidth: "100%", transition: "all 0.3s" }} />
            <div style={{ minWidth: 0, flex: 2 }}>
              <div style={{ fontSize: 12, color: "#E2E8F0", fontWeight: 600 }}>{item.obj}</div>
              <div style={{ fontSize: 11, color: mod.color }}>{item.d}</div>
              <div style={{ fontSize: 10, color: "#475569" }}>{item.n}</div>
            </div>
          </div>
        ))}
      </Card>
    );
  }

  if (mod.extraType === "spectrum") {
    return (
      <Card>
        <h3 style={{ margin: "0 0 14px", color: mod.color, fontFamily: "'Orbitron', sans-serif", fontSize: 13 }}>{mod.extraTitle}</h3>
        {mod.extraItems.map((item, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8, animation: `fadeIn 0.3s ease ${i * 0.07}s both` }}>
            <div style={{ width: 10, height: 10, borderRadius: "50%", background: item.color, flexShrink: 0, boxShadow: `0 0 8px ${item.color}` }} />
            <div style={{ width: 70, fontSize: 12, fontWeight: 700, color: item.color }}>{item.name}</div>
            <div style={{ width: 90, fontSize: 11, color: "#64748B", fontFamily: "monospace" }}>{item.λ}</div>
            <div style={{ fontSize: 11, color: "#94A3B8" }}>{item.use}</div>
          </div>
        ))}
        <div style={{ marginTop: 14, padding: "10px 14px", background: "rgba(255,255,255,0.04)", borderRadius: 8, fontSize: 12, color: "#94A3B8" }}>
          💡 <strong style={{ color: "#E2E8F0" }}>Key insight:</strong> Energy increases from left (radio) to right (gamma). Astronomers use all wavelengths to study different cosmic phenomena.
        </div>
      </Card>
    );
  }

  if (mod.extraType === "pie") {
    return (
      <Card>
        <h3 style={{ margin: "0 0 16px", color: mod.color, fontFamily: "'Orbitron', sans-serif", fontSize: 13 }}>{mod.extraTitle}</h3>
        <div style={{ display: "flex", gap: 16, flexWrap: "wrap", alignItems: "center" }}>
          <svg viewBox="0 0 100 100" style={{ width: 160, height: 160, flexShrink: 0 }}>
            {(() => {
              let start = -90;
              return mod.extraItems.map((item, i) => {
                const deg = item.pct * 3.6;
                const r = 45, cx = 50, cy = 50;
                const x1 = cx + r * Math.cos((start * Math.PI) / 180);
                const y1 = cy + r * Math.sin((start * Math.PI) / 180);
                const x2 = cx + r * Math.cos(((start + deg) * Math.PI) / 180);
                const y2 = cy + r * Math.sin(((start + deg) * Math.PI) / 180);
                const large = deg > 180 ? 1 : 0;
                const d = `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`;
                const midAngle = start + deg / 2;
                const lx = cx + 28 * Math.cos((midAngle * Math.PI) / 180);
                const ly = cy + 28 * Math.sin((midAngle * Math.PI) / 180);
                start += deg;
                return (
                  <g key={i}>
                    <path d={d} fill={item.color} opacity={0.85} />
                    <text x={lx} y={ly} textAnchor="middle" dominantBaseline="middle" fill="white" fontSize={8} fontWeight="bold">{item.pct}%</text>
                  </g>
                );
              });
            })()}
          </svg>
          <div style={{ flex: 1 }}>
            {mod.extraItems.map((item, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                <div style={{ width: 14, height: 14, borderRadius: 3, background: item.color, flexShrink: 0 }} />
                <div>
                  <div style={{ fontSize: 13, fontWeight: 700, color: item.color }}>{item.label} — {item.pct}%</div>
                  <div style={{ fontSize: 11, color: "#64748B" }}>{item.desc}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </Card>
    );
  }
  return null;
}

function QuizScreen({ mod, modIdx, qIdx, sel, feedback, onSelect, onNext, scores }) {
  const q = mod.qs[qIdx];
  const totalQ = mod.qs.length;
  const isCorrect = sel === q.ans;

  return (
    <div style={{ animation: "fadeIn 0.4s ease" }}>
      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14 }}>
        <span style={{ fontSize: 28 }}>{mod.icon}</span>
        <div style={{ flex: 1 }}>
          <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 12, color: mod.color, fontWeight: 700 }}>{mod.title}</div>
          <div style={{ fontSize: 11, color: "#475569" }}>Question {qIdx + 1} of {totalQ}</div>
        </div>
        <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 12, background: `${mod.color}22`, color: mod.color, padding: "4px 12px", borderRadius: 20 }}>
          {scores[modIdx]}/{qIdx + (feedback ? 1 : 0)}
        </div>
      </div>

      {/* Progress dots */}
      <div style={{ display: "flex", gap: 6, marginBottom: 18 }}>
        {mod.qs.map((_, i) => (
          <div key={i} style={{ flex: 1, height: 4, borderRadius: 2, background: i < qIdx ? mod.color : i === qIdx ? `${mod.color}88` : "rgba(255,255,255,0.1)", transition: "background 0.3s" }} />
        ))}
      </div>

      {/* Question card */}
      <Card style={{ marginBottom: 14 }}>
        <p style={{ margin: 0, fontSize: 15, color: "#E2E8F0", lineHeight: 1.75, fontWeight: 500 }}>{q.q}</p>
      </Card>

      {/* Options */}
      <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 16 }}>
        {q.opts.map((opt, i) => {
          let bg = "rgba(255,255,255,0.04)";
          let border = "1px solid rgba(255,255,255,0.1)";
          let col = "#CBD5E1";
          if (feedback) {
            if (i === q.ans) { bg = "rgba(52,211,153,0.15)"; border = "1px solid #34D399"; col = "#34D399"; }
            else if (i === sel && sel !== q.ans) { bg = "rgba(248,113,113,0.15)"; border = "1px solid #F87171"; col = "#F87171"; }
          } else if (sel === i) { bg = `${mod.color}22`; border = `1px solid ${mod.color}`; col = mod.color; }

          return (
            <button key={i} onClick={() => onSelect(i)} disabled={feedback} style={{
              background: bg, border, color: col, padding: "12px 16px", borderRadius: 12,
              textAlign: "left", cursor: feedback ? "default" : "pointer", fontSize: 13,
              lineHeight: 1.5, transition: "all 0.2s", display: "flex", alignItems: "center", gap: 10,
            }}>
              <span style={{ width: 22, height: 22, borderRadius: "50%", background: feedback && i === q.ans ? "#34D399" : feedback && i === sel && sel !== q.ans ? "#F87171" : `${mod.color}33`, color: feedback && i === q.ans ? "#fff" : col, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, flexShrink: 0 }}>
                {feedback && i === q.ans ? "✓" : feedback && i === sel && sel !== q.ans ? "✗" : String.fromCharCode(65 + i)}
              </span>
              {opt}
            </button>
          );
        })}
      </div>

      {/* Feedback explanation */}
      {feedback && (
        <Card style={{ marginBottom: 16, background: isCorrect ? "rgba(52,211,153,0.08)" : "rgba(248,113,113,0.08)", border: `1px solid ${isCorrect ? "#34D39944" : "#F8717144"}` }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: isCorrect ? "#34D399" : "#F87171", marginBottom: 6 }}>
            {isCorrect ? "✓ Correct!" : "✗ Not quite — here's why:"}
          </div>
          <div style={{ fontSize: 13, color: "#94A3B8", lineHeight: 1.7 }}>{q.exp}</div>
        </Card>
      )}

      {feedback && (
        <div style={{ textAlign: "right" }}>
          <Btn onClick={onNext} color={mod.glow || mod.color}>
            {qIdx < mod.qs.length - 1 ? "Next Question →" : "Module Complete →"}
          </Btn>
        </div>
      )}
    </div>
  );
}

function ModEndScreen({ mod, modIdx, score, total, onNext, isLast }) {
  const pct = Math.round((score / total) * 100);
  const g = grade(pct);
  return (
    <div style={{ textAlign: "center", animation: "fadeIn 0.5s ease", padding: "20px 0" }}>
      <div style={{ fontSize: 56, marginBottom: 10, animation: "float 3s ease-in-out infinite" }}>{mod.icon}</div>
      <h2 style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 20, color: mod.color, margin: "0 0 4px" }}>{mod.title}</h2>
      <p style={{ color: "#64748B", margin: "0 0 24px", fontSize: 13 }}>Module Complete</p>

      <div style={{ display: "inline-flex", flexDirection: "column", alignItems: "center", background: `${mod.color}15`, border: `2px solid ${mod.color}44`, borderRadius: 20, padding: "24px 40px", marginBottom: 24 }}>
        <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 52, fontWeight: 900, color: g.col, lineHeight: 1 }}>{score}/{total}</div>
        <div style={{ fontSize: 14, color: g.col, marginTop: 4 }}>{g.label}</div>
        <div style={{ fontSize: 28, fontWeight: 900, color: g.col, fontFamily: "'Orbitron', sans-serif" }}>{pct}%</div>
      </div>

      {score < total && (
        <p style={{ color: "#64748B", fontSize: 13, margin: "0 0 20px", maxWidth: 360, marginLeft: "auto", marginRight: "auto" }}>
          💡 Review the learning materials and try again later to improve your score!
        </p>
      )}

      <Btn onClick={onNext} color={mod.glow || mod.color} style={{ fontSize: 15 }}>
        {isLast ? "View Final Results 🏆" : `Continue to ${MODS[modIdx + 1]?.title || "Next Module"} →`}
      </Btn>
    </div>
  );
}

function FinalScreen({ scores, onRestart }) {
  const total = MODS.reduce((a, m) => a + m.qs.length, 0);
  const totalScore = scores.reduce((a, b) => a + b, 0);
  const pct = Math.round((totalScore / total) * 100);
  const g = grade(pct);

  return (
    <div style={{ animation: "fadeIn 0.6s ease" }}>
      <div style={{ textAlign: "center", marginBottom: 28 }}>
        <div style={{ fontSize: 60, marginBottom: 8, animation: "float 4s ease-in-out infinite" }}>🏆</div>
        <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 11, letterSpacing: 4, color: "#7DD3FC", marginBottom: 6, textTransform: "uppercase" }}>Assessment Complete</div>
        <h2 style={{ fontFamily: "'Orbitron', sans-serif", fontSize: "clamp(18px, 4vw, 28px)", fontWeight: 900, margin: "0 0 16px", color: g.col }}>
          {g.label}!
        </h2>

        <div style={{ display: "inline-flex", flexDirection: "column", alignItems: "center", background: `${g.col}15`, border: `2px solid ${g.col}44`, borderRadius: 20, padding: "20px 36px", marginBottom: 24 }}>
          <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 48, fontWeight: 900, color: g.col, lineHeight: 1 }}>{totalScore}/{total}</div>
          <div style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 22, color: g.col, marginTop: 4 }}>{pct}%</div>
          <div style={{ fontSize: 14, color: "#94A3B8", marginTop: 4 }}>Overall Score</div>
        </div>
      </div>

      {/* Per-module breakdown */}
      <Card style={{ marginBottom: 20 }}>
        <h3 style={{ fontFamily: "'Orbitron', sans-serif", fontSize: 12, color: "#7DD3FC", margin: "0 0 14px", letterSpacing: 1 }}>MODULE BREAKDOWN</h3>
        {MODS.map((m, i) => {
          const p = Math.round((scores[i] / m.qs.length) * 100);
          const mg = grade(p);
          return (
            <div key={m.id} style={{ marginBottom: 12 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
                <span style={{ fontSize: 18 }}>{m.icon}</span>
                <span style={{ flex: 1, fontSize: 13, color: "#E2E8F0" }}>{m.title}</span>
                <span style={{ fontSize: 12, fontWeight: 700, color: mg.col }}>{scores[i]}/{m.qs.length} — {p}%</span>
              </div>
              <div style={{ height: 6, background: "rgba(255,255,255,0.08)", borderRadius: 3, overflow: "hidden" }}>
                <div style={{ height: "100%", width: `${p}%`, background: `linear-gradient(90deg, ${m.color}, ${mg.col})`, borderRadius: 3, transition: "width 1s ease" }} />
              </div>
            </div>
          );
        })}
      </Card>

      <div style={{ textAlign: "center" }}>
        <Btn onClick={onRestart} color="#1D4ED8">
          Restart Assessment ↺
        </Btn>
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function AstronomyAssessment() {
  const [phase, setPhase] = useState("intro");
  const [modIdx, setModIdx] = useState(0);
  const [learnStep, setLearnStep] = useState(0);
  const [qIdx, setQIdx] = useState(0);
  const [sel, setSel] = useState(null);
  const [feedback, setFeedback] = useState(false);
  const [scores, setScores] = useState([0, 0, 0, 0, 0]);

  const mod = MODS[modIdx];
  const totalPossible = MODS.reduce((a, m) => a + m.qs.length, 0);
  const totalScore = scores.reduce((a, b) => a + b, 0);

  const progress = phase === "final" ? 100
    : phase === "modend" ? ((modIdx + 1) / MODS.length) * 100
    : ((modIdx + (phase === "quiz" ? 0.6 : phase === "learn" ? learnStep / 3 : 0)) / MODS.length) * 100;

  function handleSelect(i) {
    if (feedback) return;
    setSel(i);
    setFeedback(true);
    if (i === mod.qs[qIdx].ans) {
      setScores(prev => { const n = [...prev]; n[modIdx]++; return n; });
    }
  }

  function handleNext() {
    setSel(null); setFeedback(false);
    if (qIdx < mod.qs.length - 1) { setQIdx(q => q + 1); }
    else { setPhase("modend"); }
  }

  function handleNextMod() {
    if (modIdx < MODS.length - 1) {
      setModIdx(m => m + 1); setLearnStep(0); setQIdx(0);
      setSel(null); setFeedback(false); setPhase("learn");
    } else { setPhase("final"); }
  }

  function handleRestart() {
    setPhase("intro"); setModIdx(0); setLearnStep(0); setQIdx(0);
    setSel(null); setFeedback(false); setScores([0, 0, 0, 0, 0]);
  }

  const CSS = `
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    @keyframes twinkle { from { opacity: 0.15; } to { opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    button { font-family: 'Exo 2', sans-serif; }
  `;

  return (
    <div style={{
      minHeight: "100vh",
      background: "linear-gradient(160deg, #020617 0%, #0F0B2A 45%, #1A0A2E 75%, #020617 100%)",
      fontFamily: "'Exo 2', sans-serif",
      color: "#E2E8F0",
      position: "relative",
      overflowX: "hidden",
    }}>
      <style>{CSS}</style>

      {/* Star field */}
      <div style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 0 }}>
        {STARS.map(s => (
          <div key={s.id} style={{
            position: "absolute", left: `${s.x}%`, top: `${s.y}%`,
            width: `${s.r}px`, height: `${s.r}px`, borderRadius: "50%",
            background: "white", opacity: s.o,
            animation: `twinkle ${s.d}s ease-in-out infinite alternate`,
            animationDelay: `${s.delay}s`,
          }} />
        ))}
      </div>

      {/* Progress bar */}
      {phase !== "intro" && (
        <>
          <div style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 100, height: 3, background: "rgba(255,255,255,0.08)" }}>
            <div style={{ height: "100%", width: `${progress}%`, background: `linear-gradient(90deg, ${mod?.color || "#7C3AED"}, #EC4899)`, transition: "width 0.6s ease" }} />
          </div>
          <div style={{ position: "fixed", top: 8, right: 12, zIndex: 100, fontFamily: "'Orbitron', sans-serif", fontSize: 10, color: "#334155" }}>
            {totalScore}/{totalPossible}
          </div>
        </>
      )}

      {/* Main content */}
      <div style={{ position: "relative", zIndex: 10, maxWidth: 760, margin: "0 auto", padding: "clamp(16px, 4vw, 32px) clamp(14px, 3vw, 24px)", minHeight: "100vh" }}>
        {phase === "intro" && <IntroScreen onStart={() => setPhase("learn")} />}
        {phase === "learn" && <LearnScreen mod={mod} step={learnStep} setStep={setLearnStep} onQuiz={() => setPhase("quiz")} />}
        {phase === "quiz" && <QuizScreen mod={mod} modIdx={modIdx} qIdx={qIdx} sel={sel} feedback={feedback} onSelect={handleSelect} onNext={handleNext} scores={scores} />}
        {phase === "modend" && <ModEndScreen mod={mod} modIdx={modIdx} score={scores[modIdx]} total={mod.qs.length} onNext={handleNextMod} isLast={modIdx === MODS.length - 1} />}
        {phase === "final" && <FinalScreen scores={scores} onRestart={handleRestart} />}
      </div>
    </div>
  );
}


    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(AstronomyAssessment));
  </script>
</body>
